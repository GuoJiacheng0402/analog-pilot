<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" role="img" aria-label="AnalogPilot architecture and design flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/><stop offset="1" stop-color="#15233b"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <style>
      .h    { font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif; font-weight:700; }
      .t    { font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif; font-weight:400; }
      .mono { font-family:"SFMono-Regular",Consolas,"JetBrains Mono",monospace; }
      .cap  { font-family:"SFMono-Regular",Consolas,monospace; letter-spacing:1.5px; }
    </style>
  </defs>

  <rect width="1000" height="440" rx="16" fill="url(#bg)"/>
  <rect x="0" y="0" width="6" height="440" fill="url(#acc)"/>

  <text x="34" y="40" class="cap" font-size="13" fill="#64748b">ARCHITECTURE</text>

  <!-- LOCAL box -->
  <rect x="40" y="64" width="280" height="150" rx="12" fill="#0e1a2e" stroke="#334155"/>
  <text x="60" y="92" class="cap" font-size="11" fill="#64748b">LOCAL WORKSTATION</text>
  <text x="60" y="128" class="h" font-size="30" fill="#f8fafc">Analog<tspan fill="url(#acc)">Pilot</tspan></text>
  <text x="60" y="156" class="t" font-size="14" fill="#cbd5e1">Python API · CLI</text>
  <text x="60" y="178" class="mono" font-size="12.5" fill="#94a3b8">SkillClient · SpectreRunner</text>
  <text x="60" y="197" class="mono" font-size="12.5" fill="#94a3b8">LayoutEditor</text>

  <!-- connector -->
  <line x1="320" y1="139" x2="636" y2="139" stroke="url(#acc)" stroke-width="2.5"/>
  <polygon points="636,139 624,133 624,145" fill="#818cf8"/>
  <text x="478" y="128" text-anchor="middle" class="t" font-size="13" fill="#cbd5e1">SSH tunnel</text>
  <text x="478" y="160" text-anchor="middle" class="mono" font-size="11.5" fill="#64748b">SKILL · Spectre · rsync</text>

  <!-- SERVER box -->
  <rect x="640" y="50" width="320" height="178" rx="12" fill="#0e1a2e" stroke="#334155"/>
  <text x="660" y="78" class="cap" font-size="11" fill="#64748b">SCHOOL OF MICROELECTRONICS · EDA SERVER</text>
  <g>
    <rect x="660" y="92" width="280" height="34" rx="7" fill="#13233c" stroke="#3b4d6b"/>
    <text x="674" y="114" class="h" font-size="14" fill="#e2e8f0">Virtuoso IC618 <tspan class="mono" font-size="11.5" fill="#38bdf8">— SKILL daemon</tspan></text>
    <rect x="660" y="132" width="280" height="34" rx="7" fill="#13233c" stroke="#3b4d6b"/>
    <text x="674" y="154" class="h" font-size="14" fill="#e2e8f0">Spectre <tspan class="mono" font-size="11.5" fill="#38bdf8">— simulation</tspan></text>
    <rect x="660" y="172" width="280" height="34" rx="7" fill="#13233c" stroke="#3b4d6b"/>
    <text x="674" y="194" class="h" font-size="14" fill="#e2e8f0">Calibre <tspan class="mono" font-size="11.5" fill="#38bdf8">— DRC / LVS / PEX</tspan></text>
  </g>

  <!-- divider -->
  <line x1="34" y1="262" x2="966" y2="262" stroke="#233149" stroke-width="1"/>
  <text x="34" y="294" class="cap" font-size="13" fill="#64748b">DESIGN FLOW</text>
  <text x="966" y="294" text-anchor="end" class="t" font-size="12.5" fill="#94a3b8">scriptable · reproducible · parallelizable</text>

  <!-- pipeline pills -->
  <g class="h" font-size="13.5" text-anchor="middle">
    <g>
      <rect x="44"  y="330" width="112" height="42" rx="9" fill="#13233c" stroke="url(#acc)"/><text x="100"  y="356" fill="#f1f5f9">Schematic</text>
      <rect x="176" y="330" width="112" height="42" rx="9" fill="#13233c" stroke="url(#acc)"/><text x="232"  y="356" fill="#f1f5f9">Pre-sim</text>
      <rect x="308" y="330" width="112" height="42" rx="9" fill="#13233c" stroke="url(#acc)"/><text x="364"  y="356" fill="#f1f5f9">Layout</text>
      <rect x="440" y="330" width="112" height="42" rx="9" fill="#13233c" stroke="url(#acc)"/><text x="496"  y="356" fill="#f1f5f9">DRC</text>
      <rect x="572" y="330" width="112" height="42" rx="9" fill="#13233c" stroke="url(#acc)"/><text x="628"  y="356" fill="#f1f5f9">LVS</text>
      <rect x="704" y="330" width="112" height="42" rx="9" fill="#13233c" stroke="url(#acc)"/><text x="760"  y="356" fill="#f1f5f9">PEX</text>
      <rect x="836" y="330" width="112" height="42" rx="9" fill="#13233c" stroke="url(#acc)"/><text x="892"  y="356" fill="#f1f5f9">Post-sim</text>
    </g>
  </g>
  <g stroke="#818cf8" stroke-width="2" fill="#818cf8">
    <line x1="156" y1="351" x2="172" y2="351"/><polygon points="176,351 168,347 168,355"/>
    <line x1="288" y1="351" x2="304" y2="351"/><polygon points="308,351 300,347 300,355"/>
    <line x1="420" y1="351" x2="436" y2="351"/><polygon points="440,351 432,347 432,355"/>
    <line x1="552" y1="351" x2="568" y2="351"/><polygon points="572,351 564,347 564,355"/>
    <line x1="684" y1="351" x2="700" y2="351"/><polygon points="704,351 696,347 696,355"/>
    <line x1="816" y1="351" x2="832" y2="351"/><polygon points="836,351 828,347 828,355"/>
  </g>
  <text x="500" y="408" text-anchor="middle" class="mono" font-size="11.5" fill="#64748b">validated end-to-end on real CSMC05_M3 hardware</text>
</svg>
